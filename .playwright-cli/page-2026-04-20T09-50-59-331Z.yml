                - text: Mars90210 — мягкая марсианская драмеди о четырёх женщинах, которые живут в колонии
                - code [ref=e27]: Новая Заря
                - text: "и постепенно понимают, как дорого обходится вечная надёжность. Здесь мало внешнего героизма и много обычной жизни: смены, очередь, чужие просьбы, чай после работы, усталость, которую уже трудно скрывать."
              - paragraph [ref=e28]: Это история о близости, страхе, стыде и нежности. Важнее всего здесь не эффектные повороты, а то, как человек делает паузу перед ответом, как старается не расплакаться на смене, как злится, как заботится о других, даже когда сил почти не осталось. Большой конфликт сезона проходит через маленький жест, потому что именно так и чувствуется настоящая жизнь.
              - paragraph [ref=e29]: "Марс здесь — это не аттракцион будущего, а обычный быт под куполом: логистика, свет через стекло, искусственное море, тревога от новых протоколов и редкое тепло, которое держится не благодаря системе, а вопреки ей."
              - paragraph [ref=e30]: Поэтому Mars90210 устроен как литературный мир, в котором сначала видны лицо, ткань, поза и ритм разговора, а уже потом техника, купола и терминалы.
