              - paragraph [ref=e40]:
                - text: Каждая иллюстрация начинается с точного драматургического момента. Для сцены заранее фиксируются героини, предметы, эмоциональная температура, точка кадра и узнаваемые детали — синяя джинсовая куртка, яркий шарф, ключик, короткая стрижка, свет
                - code [ref=e41]: Orbita
                - text: ", стекло, марсианская пыль. Генерация здесь помогает памяти мира, а не подменяет её."
              - paragraph [ref=e42]: То же касается портретов и всего визуального языка сайта. Генерация нужна здесь для скорости и вариативности, но не для произвола. Если изображение теряет характер, возраст, силуэт или превращает живую сцену в абстрактный постер, его просто переделывают.
              - paragraph [ref=e43]: "Граница проста: машина помогает делать материал, но художественное решение остаётся у человека. Поэтому для Mars90210 важен не сам факт генерации, а то, насколько аккуратно она встроена в авторский контроль и общую визуальную систему."
