              - paragraph [ref=e52]: За Mars90210 стоит Ilya G Mirin — инженер и автор, для которого технология не существует отдельно от высказывания. Здесь одна и та же рука собирает и систему, и историю.
              - paragraph [ref=e53]: По основной работе он занимается AI-системами, LLM-инфраструктурой и внутренними продуктами, которые нужно не только придумать, но и довести до устойчивого рабочего состояния. Это тот тип инженерии, где расплывчатый замысел приходится превращать в понятный и надёжный инструмент.
              - paragraph [ref=e54]: Параллельно у него есть большой собственный опыт в GenAI-пайплайнах для визуального и нарративного контента, включая TONYA AI и практику доведения экспериментальных генеративных систем до повторяемого и наблюдаемого рабочего процесса.
              - paragraph [ref=e55]: Поэтому Mars90210 ощущается не как случайный арт-эксперимент, а как авторский проект, в котором литературная интонация, визуальный контроль и рабочая система сборки материала действительно держатся вместе.
