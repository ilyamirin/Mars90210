        - paragraph [ref=e18]: "Фокус: Лира"
        - paragraph [ref=e19]: "Временная точка: 1 октября 2089, утро"
        - paragraph [ref=e20]: "Ключевая сцена: сбой в ПВЗ и ручная выдача посылок под красными аварийными огнями"
      - generic [ref=e21]:
        - paragraph [ref=e22]: "Лира проснулась раньше будильника — от той особенной тишины, которая бывает только под куполом перед началом рабочего дня, когда город ещё не заговорил, но уже дышит. На кухонной панели медленно проступали цифры времени. Вода в чайнике едва слышно шуршала. Снаружи, за светлым стеклом, лежал привычный марсианский рассвет: не розовый, не земной, а ржаво-золотой, как будто кто-то осторожно тёр о небо старую медь."
        - paragraph [ref=e23]: На спинке стула висела джинсовая куртка.
        - paragraph [ref=e24]: Лира посмотрела на неё так, как смотрят на вещь, которая слишком долго знала о тебе больше, чем люди. Потёртый шов на рукаве, мягкий ворот, карман, в котором однажды затерялась бумажка с земным адресом и так и осталась там жить — как будто память можно носить сложенной вчетверо.
        - paragraph [ref=e25]: Она надела куртку и сразу почувствовала знакомое облегчение. Не радость. Не уверенность. Просто воздух стал проходить через грудь чуть ровнее.
        - paragraph [ref=e26]: В ПВЗ пахло картоном, кофе из старого автомата и ночной прохладой, которую ещё не до конца съели системы климата. Марта уже стояла у стойки выдачи и осторожно расправляла бланки так, будто боялась помять не бумагу, а чей-то день. Руслана шла по залу быстрым упругим шагом, проверяя сканеры и ячейки хранения. Айгуль, закутанная в тёмно-красный шарф, смотрела в планшет так сосредоточенно, будто если достаточно долго не моргать, мир наконец скажет правду.
        - paragraph [ref=e27]: — Доброе утро, — сказала Лира.
        - paragraph [ref=e28]: — Если оно доброе, то только потому, что ты пришла, — отозвалась Руслана, не поднимая головы. — За ночь опять подвисла логистика на внешнем секторе.
        - paragraph [ref=e29]: Лира кивнула. Такие фразы давно перестали быть новостью. Город жил на сбоях и том достоинстве, с которым люди делали вид, что это всего лишь рабочий шум.
        - paragraph [ref=e30]: Первые клиенты вошли ровно в восемь. Кто-то торопился на смену. Кто-то пришёл за лекарствами. Кто-то — за деталью к фильтру воздуха. На Марсе чужая посылка никогда не бывает просто чужой посылкой. Почти всегда она уже часть чьей-то маленькой необходимости.
        - paragraph [ref=e31]: Первые пятнадцать минут всё шло спокойно. Сканеры пищали своим равнодушным, деловым голосом. Робот-курьер шуршал по направляющей, разворачиваясь к стеллажам. Марта улыбалась клиентам той светлой, выученной улыбкой, от которой у Лиры иногда сжималось сердце. Руслана держала очередь в движении одним взглядом. Айгуль сверяла статусы быстрее, чем система успевала обновляться.
        - paragraph [ref=e32]: А потом один из терминалов мигнул красным.
        - paragraph [ref=e33]: Потом второй.
        - paragraph [ref=e34]: Потом главный экран у стойки выдачи погас на одну мучительно короткую секунду и включился снова — уже с полосой аварийного уведомления.
        - paragraph [ref=e35]:
          - code [ref=e36]: МАРШРУТИЗАЦИЯ НАРУШЕНА. 87 ОТПРАВЛЕНИЙ ПЕРЕНАПРАВЛЕНЫ ВО ВНЕШНИЙ СЕКТОР.
        - paragraph [ref=e37]: Лира не сразу поняла смысл прочитанного. Слова были ясными, но разум отказывался впускать их внутрь. Внешний сектор означал пустые технические коридоры за жилым кольцом, сервисные шлюзы, склады временного хранения. Не место, куда по ошибке можно отправить восемьдесят семь живых, чьих-то, нужных сегодня вещей.
        - paragraph [ref=e38]: — Айгуль? — тихо сказала она.
        - paragraph [ref=e39]: Айгуль уже стучала по планшету, слишком быстро, слишком точно.
        - paragraph [ref=e40]: — Это не локальный сбой, — ответила она. — Кто-то перебил цепочку маршрутов после ночной сверки.
        - paragraph [ref=e41]: Руслана резко обернулась к очереди, словно надеялась заслонить людей собой.
        - paragraph [ref=e42]: — Что значит — после сверки?
        - paragraph [ref=e43]: — То и значит.
        - paragraph [ref=e44]: Кто-то из клиентов уже видел красную полосу на экране. По залу пошёл тот особенный шорох, в котором раздражение ещё не стало громким, но уже перестало быть терпеливым.
        - paragraph [ref=e45]: — У меня ребёнок с температурой, — сказала женщина в сером пальто. — Там жаропонижающее.
        - paragraph [ref=e46]: — А у меня фильтр на вечернюю смену, — отрывисто бросил мужчина у стеклянной двери. — Вы шутите сейчас?
        - paragraph [ref=e47]: Марта побледнела и машинально коснулась ключика на шее.
        - paragraph [ref=e48]: — Извините, пожалуйста, мы сейчас...
        - paragraph [ref=e49]: Но система снова моргнула. Красный свет полоснул по её лицу, по Лириному рукаву, по шарфу Айгуль, по стеклу кабинета, за которым всё вдруг стало похоже не на рабочее утро, а на тревожный отсек корабля.
        - paragraph [ref=e50]: Лира сделала вдох.
        - paragraph [ref=e51]: Потом ещё один.
        - paragraph [ref=e52]: "В груди поднималось то старое, до боли знакомое чувство: если она сейчас не станет больше себя самой, мир начнёт рассыпаться прямо у неё на глазах. Она знала это чувство так хорошо, что почти принимала его за профессионализм."
        - paragraph [ref=e53]: — Не волнуйтесь, — сказала она клиентам, и собственный голос показался ей тоньше обычного. — Мы разберёмся.
        - paragraph [ref=e54]: Это была правильная фраза. Ровная. Нужная. Та, которую от неё и ждали.
        - paragraph [ref=e55]: Но ничего не изменилось.
        - paragraph [ref=e56]: Женщина с лекарством смотрела на неё с плохо скрытым ужасом. Мужчина у двери уже сердито проверял время на браслете. Где-то сзади заплакал ребёнок — коротко, обиженно, как будто просто напомнил взрослым, что у любой задержки есть чьё-то живое тело.
        - paragraph [ref=e57]: Айгуль подняла глаза от экрана.
        - paragraph [ref=e58]: — Лир, если это влезло в ночную маршрутизацию, нам не вернут систему за пять минут.
        - paragraph [ref=e59]: Лира кивнула, но кивок ничего не значил. В висках тонко зазвенело. Она вдруг очень ясно почувствовала, как тяжелеют плечи под курткой, как ткань у локтя упирается в кожу, как сухо во рту, как люди ждут от неё не правды, а немедленного исправления мира.
        - paragraph [ref=e60]: И именно в эту секунду она поняла, что исправить мир немедленно не сможет.
        - paragraph [ref=e61]: Это было не новое знание. Новым было то, что оно встало в ней целиком, без возможности отвести глаза.
        - paragraph [ref=e62]: — Лира, — почти шёпотом сказала Марта, — что делать?
        - paragraph [ref=e63]: Вопрос прозвучал тихо. Без нажима. Без паники. И от этого стал ещё тяжелее.
        - paragraph [ref=e64]: Лира посмотрела на неё. На Айгуль. На Руслану, которая уже держала очередь одними скулами и прямой спиной. На людей по ту сторону стойки. На красный свет, который медленно вращался по стеклу.
        - paragraph [ref=e65]:
          - text: "Ей хотелось сказать:"
          - code [ref=e66]: Я разберусь
          - text: .
        - paragraph [ref=e67]: Ей хотелось надеть на лицо ту самую спокойную улыбку, после которой все обычно успокаивались хотя бы на время.
        - paragraph [ref=e68]: "Вместо этого она произнесла:"
        - paragraph [ref=e69]: — Я одна сейчас не разберусь.
        - paragraph [ref=e70]: Слова прозвучали негромко. Почти буднично. Но в зале что-то изменилось — так меняется воздух перед дождём, когда никто ещё не успел намокнуть, а кожа уже знает.
        - paragraph [ref=e71]: Айгуль первая отвела взгляд обратно к планшету.
        - paragraph [ref=e72]: — Хорошо, — сказала она. — Тогда считаем вручную. Я подниму последнюю чистую выгрузку и сверю, что ушло в ложный маршрут.
        - paragraph [ref=e73]: — Я возьму очередь, — отрезала Руслана. — Сначала лекарства, фильтры и всё, что нужно до конца смены. Остальные ждут или оставляют адреса.
        - paragraph [ref=e74]: Марта выпрямилась так быстро, будто испугалась собственной нерешительности.
        - paragraph [ref=e75]: — А я... а я буду звонить тем, чьи посылки ушли дальше всех. Чтобы они не ехали зря.
        - paragraph [ref=e76]: "Лира смотрела на них, и чувство вины почему-то не росло, как обычно, а отступало на полшага. Не исчезало — нет. Просто рядом с ним вдруг появилось что-то ещё. Не облегчение даже. Что-то более редкое и почти забытое: ощущение, что опора может быть не только у неё внутри."
        - paragraph [ref=e77]: Она расстегнула верхнюю кнопку куртки. Просто потому, что стало невозможно дышать так же тесно, как минуту назад.
        - paragraph [ref=e78]: — Тогда я иду на склад, — сказала она. — Проверю ручную выдачу по бумажным ячейкам. И... спасибо.
        - paragraph [ref=e79]: Последнее слово прозвучало немного хрипло. Ей нечасто приходилось произносить его не из вежливости, а из нужды.
        - paragraph [ref=e80]: Следующие два часа прошли так, будто ПВЗ вдруг отмотали назад на много лет, в ещё не дополированное до идеала время, когда каждая вещь требовала рук, памяти и усталого человеческого внимания. Руслана разговаривала с людьми быстро и твёрдо, не давая панике стать главным языком зала. Марта звонила тем, чьи посылки исчезли из сети, и в её тихом голосе было столько настоящего сочувствия, что несколько человек вместо раздражения начинали извиняться сами. Айгуль вела ручной реестр с такой яростью точности, будто мстила не сбою, а самому принципу, по которому жизнь опять попробовали разложить без остатка.
        - paragraph [ref=e81]: К полудню они нашли двадцать три отправления. Ещё двенадцать удалось перехватить на внешнем шлюзе. Остальные повисли в логистической серой зоне — не потерянные, но и не возвращённые. Красный свет на главном терминале погас, зато осталась обычная белая подсветка, от которой лица всегда казались более уставшими, чем были на самом деле.
        - paragraph [ref=e82]: Лира стояла у стойки, глядя, как женщина в сером пальто прижимает к груди маленькую коробку с лекарством. В обычный день это была бы одна из сотен незаметных передач из рук в руки. Сейчас в этом жесте было что-то слишком большое для простой рабочей операции.
        - paragraph [ref=e83]: — Спасибо, — сказала женщина.
        - paragraph [ref=e84]:
          - text: Лира хотела ответить привычное
          - code [ref=e85]: Это наша работа
          - text: .
        - paragraph [ref=e86]: Но не ответила.
        - paragraph [ref=e87]: Потому что сегодня это было не про работу.
        - paragraph [ref=e88]: Когда зал наконец опустел, Айгуль подошла к ней и положила на стойку планшет.
        - paragraph [ref=e89]: — Посмотри на временные метки, — сказала она. — Сбой не похож на случайный.
        - paragraph [ref=e90]: Лира опустила взгляд. Ночная сверка. Перебитая цепочка маршрутов. Правка уже после автоматического закрытия окна. Чужая рука внутри системы.
        - paragraph [ref=e91]: В животе снова стало холодно, но теперь это был другой холод — не паника, а предчувствие.
        - paragraph [ref=e92]: На экране внутренней почты уже мигало новое уведомление.
        - paragraph [ref=e93]:
          - code [ref=e94]: ПВЗ "Новая Заря" включён в первичный аудит программы Phase Zero.
        - paragraph [ref=e95]: "Ниже стояло короткое примечание:"
        - paragraph [ref=e96]:
          - code [ref=e97]: "Руководителю подразделения прибыть на встречу завтра в 09:00. Представитель банка: Силан Демир."
        - paragraph [ref=e98]: Лира перечитала имя дважды, будто в этом могло быть спрятано объяснение.
        - paragraph [ref=e99]: Потом подняла голову.
        - paragraph [ref=e100]: "За стеклом купола медленно темнело марсианское небо. ПВЗ снова выглядел обычным: стеллажи, коробки, белый свет, пустая очередь. Только синяя ткань на её рукаве казалась тяжелее, чем утром."
        - paragraph [ref=e101]: Она коснулась локтя, как будто проверяла, на месте ли броня.
        - paragraph [ref=e102]: И впервые за долгое время подумала не о том, как спасти всех.
        - paragraph [ref=e103]: А о том, выдержит ли сама.
