        - generic [ref=e36]:
          - paragraph [ref=e37]: Снег под куполом всегда казался немного нелепым.
          - paragraph [ref=e38]: Слишком белый. Слишком правильный. Слишком похожий на тщательно согласованную ностальгию по Земле, которую можно запускать по расписанию. И всё же в эту полночь, когда первые лёгкие хлопья пошли сверху, никто не смеялся.
          - paragraph [ref=e39]: Они стояли у ПВЗ впятером — Лира, Айгуль, Марта, Руслана и Силан чуть поодаль, как человек, который ещё не считает себя вправе встать внутрь круга до конца, но уже и не может остаться совсем снаружи. Где-то неподалёку светился маркет, дети тянули руки к снегу, взрослые поднимали стаканы, искусственное море отражало огни, а над всем этим медленно падали белые хлопья, которых на Марсе по природе быть не могло.
          - paragraph [ref=e40]: Лира подняла лицо к снегу первой.
          - paragraph [ref=e41]: Несколько хлопьев легли на синий рукав её куртки.
          - paragraph [ref=e42]: "И вдруг она очень ясно почувствовала, как далеко они ушли от той первой утренней тревоги с красным сигналом, от страха, от роли, от одиночного героизма. Ничего не стало идеально. Проект не исчез. Мир не исправился. Но что-то основное всё-таки произошло: они перестали отдавать свою жизнь без боя и без имени."
          - paragraph [ref=e43]: Айгуль стояла рядом в тёмном шарфе, и на её лице впервые за долгое время не было ни жёсткой маски, ни иронической усмешки. Только редкая открытая тишина. Марта подставляла ладони снегу так бережно, как будто собирала доказательство того, что нежность может падать сверху и не быть ловушкой. Руслана держала в кармане маленькую игрушку и смотрела вперёд без своей прежней внутренней поспешности. Взгляд у неё был спокойный, как у человека, который больше не торгуется с собственной жизнью.
          - paragraph [ref=e44]: — За нас? — тихо сказала Марта.
          - paragraph [ref=e45]: — За нас, — ответила Лира.
          - paragraph [ref=e46]: — И за то, что мы ужасно неудобные для системы женщины, — добавила Айгуль.
          - paragraph [ref=e47]: "Руслана фыркнула:"
          - paragraph [ref=e48]: — Наконец-то достойный тост.
          - paragraph [ref=e49]: Они чокнулись пластиковыми стаканами.
          - paragraph [ref=e50]: Смех вышел тихий, настоящий.
          - paragraph [ref=e51]: Без позы.
          - paragraph [ref=e52]: Без попытки сделать из этой минуты красивый финал.
          - paragraph [ref=e53]: Потому что это и не был финал.
          - paragraph [ref=e54]: Скорее место, где после долгой борьбы можно наконец на минуту почувствовать себя не функцией, не ресурсом, не доказательной единицей и не полезной сильной женщиной.
          - paragraph [ref=e55]: Просто живым человеком среди других живых людей.
          - paragraph [ref=e56]: Снег всё шёл.
          - paragraph [ref=e57]: Лёгкий.
          - paragraph [ref=e58]: Искусственный.
          - paragraph [ref=e59]: Совсем не настоящий по происхождению и всё-таки настоящий по тому, как ложился на их лица, волосы, плечи.
          - paragraph [ref=e60]: "Лира смотрела на подруг и думала, что, возможно, именно так и выглядит взрослая надежда: не обещание, что дальше всё будет хорошо, а тихое знание, что теперь они уже не одни и не безголосы."
          - paragraph [ref=e61]: Под куполом марсианской колонии начался новый год.
          - paragraph [ref=e62]: И вместе с ним — жизнь, которую они больше не собирались возвращать системе целиком.
